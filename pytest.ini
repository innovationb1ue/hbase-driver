[pytest]
# Test discovery
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Timeouts to prevent hanging tests
timeout = 60
timeout_method = thread

# Verbose output
addopts = -v --tb=short

# Markers
markers =
    order: mark test to run in order (disabled for parallel)
    slow: mark test as slow running
