version: "3.8"

services:
  zookeeper:
    image: zookeeper:3.7
    container_name: hbase_zookeeper
    ports:
      - "2181:2181"

  hbase-master:
    image: harisekhon/hbase
    container_name: hbase_master
    depends_on:
      - zookeeper
    environment:
      - ZOOKEEPER_QUORUM=zookeeper
    ports:
      - "16010:16010"
      - "16000:16000"
    command: master

  hbase-regionserver:
    image: harisekhon/hbase
    container_name: hbase_regionserver
    depends_on:
      - hbase-master
      - zookeeper
    environment:
      - ZOOKEEPER_QUORUM=zookeeper
    command: regionserver

  hbase-rest:
    image: harisekhon/hbase
    container_name: hbase_rest
    depends_on:
      - hbase-master
    environment:
      - ZOOKEEPER_QUORUM=zookeeper
    command: rest

  hbase-thrift:
    image: harisekhon/hbase
    container_name: hbase_thrift
    depends_on:
      - hbase-master
    environment:
      - ZOOKEEPER_QUORUM=zookeeper
    command: thrift

  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hbase_dev
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      - hbase-master
    tty: true
    stdin_open: true
    command: bash
