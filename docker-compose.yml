version: "3.8"

services:
  hbase:
    build:
      context: .
      dockerfile: docker/hbase/Dockerfile
    container_name: hbase
    ports:
      - "16010:16010"
      - "16000:16000"
      - "16020:16020"
      - "16030:16030"
      - "2181:2181"
    volumes:
      - hbase-data:/hbase-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16010/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hbase_dev
    volumes:
      - ./:/workspace
    working_dir: /workspace
    depends_on:
      hbase:
        condition: service_healthy
    tty: true
    stdin_open: true
    command: bash

volumes:
  hbase-data:
